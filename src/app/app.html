<div class="h-full flex items-center justify-center flex-col w-full bg-gray-200">
  <div class="flex flex-col ">
    <h3 class="text-2xl font-bold">Hello!</h3>
    <p class="font-semibold">Please search your destination below to generate a pallete</p>
    <input type="text" [(ngModel)]="searchString"  [placeholder]="selectedCity() != null ? selectedCity()!.join(', '): 'City'" class="rounded border w-100  px-2 py-1">
    <div class="h-50 w-100">

      @if(citySearchResults().length > 0){

        <div class="bg-white flex flex-col gap-3 w-100 h-50 overflow-y-scroll px-2 ">
          @for (city of citySearchResults(); track $index) {
            <span (click)="selectCiy(city)" class="hover:cursor-pointer hover:bg-blue-100 rounded transition-colors">{{city[0]}}, {{city[1]}}</span>
          }
        </div>
      }
    </div>
  </div>

</div>
